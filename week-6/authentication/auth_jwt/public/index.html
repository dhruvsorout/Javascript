<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.7/axios.min.js"></script>
</head>
<body>
    <div id="signup">
        Signup
        <input type="text" name="username" placeholder="Username" id="signup-username">
        <input type="password" name="password" placeholder="Password" id="signup-password">
        <button onclick="signup()">Submit</button>
    </div>

    <div id="signin">
        Signin
        <input type="text" name="username" placeholder="Username" id="signin-username">
        <input type="password" name="password" placeholder="Password" id="signin-password">
        <button onclick="signin()">Submit</button>
    </div>

    <div>
        User information: 
        <div id="information"></div>
    </div>

    <div>
        <button onclick="logout()">Logout</button>
    </div>

    <script>
        async function signup() {
            const username = document.getElementById("signup-username").value;
            const password = document.getElementById("signup-password").value;

            const reponse = await axios.post("http://localhost:3000/signup", {
                username: username,
                password: password
            })
            alert("Signed up successfully");
        }

        async function signin() {
            const username = document.getElementById("signin-username").value;
            const password = document.getElementById("signin-password").value;

            const response = await axios.post("http://localhost:3000/signin", {
                username: username,
                password: password
            })

            localStorage.setItem("token", response.data.token);

            alert("Signed in successfully")
        }

        async function logout() {
            localStorage.removeItem("token");
            alert("Logges out successfully")
        }

        async function getUserInformation() {
            const token = localStorage.getItem("token");

            if (token) {
                const response = await axios.get("http://localhost:3000/me", {
                    headers: {
                        Authorization: token
                    }
                });
                document.getElementById("information").innerHTML = response.data.username;
            }
        }
        getUserInformation();
    </script>
</body>
</html>
